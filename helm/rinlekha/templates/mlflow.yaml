apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: {{ include "rinlekha.namespace" . }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.mlflow.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ include "rinlekha.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: {{ .Values.mlflow.image }}
          imagePullPolicy: {{ .Values.mlflow.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.mlflow.port }}
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlflow.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: {{ include "rinlekha.namespace" . }}
spec:
  selector:
    app: mlflow
  ports:
    - port: {{ .Values.mlflow.port }}
      targetPort: {{ .Values.mlflow.port }}
  type: ClusterIP
